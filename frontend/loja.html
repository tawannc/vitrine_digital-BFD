<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Minha Loja</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Perfil da Loja</h1>

    <button onclick="carregarLoja()">Carregar Dados da Loja</button>
    <br><br>

    <label>Nome da Loja:</label><br>
    <input type="text" id="nome"><br><br>

    <label>Descrição:</label><br>
    <textarea id="descricao"></textarea><br><br>

    <button onclick="salvarLoja()">Salvar Alterações</button>

    <pre id="resultado"></pre>

    <script>
        async function carregarLoja() {
            const token = localStorage.getItem("token");

            if (!token) {
                alert("Você precisa fazer login primeiro!");
                return;
            }

            const resposta = await fetch("http://localhost:8000/loja/", {
                method: "GET",
                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            const dados = await resposta.json();

            document.getElementById("nome").value = dados.nome || "";
            document.getElementById("descricao").value = dados.descricao || "";

            document.getElementById("resultado").textContent = JSON.stringify(dados, null, 2);
        }

        async function salvarLoja() {
            const token = localStorage.getItem("token");

            if (!token) {
                alert("Você precisa fazer login primeiro!");
                return;
            }

            const nome = document.getElementById("nome").value;
            const descricao = document.getElementById("descricao").value;

            const resposta = await fetch("http://localhost:8000/loja/", {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({
                    nome: nome,
                    descricao: descricao
                })
            });

            const dados = await resposta.json();
            document.getElementById("resultado").textContent = JSON.stringify(dados, null, 2);

            if (resposta.ok) {
                alert("Loja atualizada com sucesso!");
            }
        }
    </script>
</body>
</html>
