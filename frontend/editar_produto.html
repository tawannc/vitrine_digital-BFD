<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Editar Produto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Editar Produto</h1>

<label>ID do Produto:</label>
<input type="number" id="produtoId">

<button onclick="carregarProduto()">Carregar Produto</button>

<hr>

<label>Nome:</label>
<input type="text" id="nome">

<label>Descrição:</label>
<textarea id="descricao"></textarea>

<label>Preço:</label>
<input type="number" id="preco" step="0.01">

<label>Estoque:</label>
<input type="number" id="estoque">

<label>Categoria:</label>
<select id="categoria"></select>

<button onclick="editarProduto()">Salvar Alterações</button>

<pre id="resultado"></pre>

<script>
// ===============================
// 1. CARREGAR CATEGORIAS
// ===============================
async function carregarCategorias() {
    const token = localStorage.getItem("token");

    const resposta = await fetch("http://localhost:8000/categorias/", {
        headers: { "Authorization": "Bearer " + token }
    });

    const categorias = await resposta.json();

    const select = document.getElementById("categoria");
    select.innerHTML = ""; // limpa antes de preencher

    categorias.forEach(cat => {
        const option = document.createElement("option");
        option.value = cat.id;
        option.textContent = cat.nome;
        select.appendChild(option);
    });
}

carregarCategorias(); // chama automaticamente ao abrir a página


// ===============================
// 2. CARREGAR PRODUTO PELO ID
// ===============================
async function carregarProduto() {
    const token = localStorage.getItem("token");
    const id = document.getElementById("produtoId").value;

    const resposta = await fetch(`http://localhost:8000/produtos/${id}/`, {
        headers: { "Authorization": "Bearer " + token }
    });

    const dados = await resposta.json();

    document.getElementById("nome").value = dados.nome;
    document.getElementById("descricao").value = dados.descricao;
    document.getElementById("preco").value = dados.preco;
    document.getElementById("estoque").value = dados.estoque;

    // Seleciona a categoria atual
    document.getElementById("categoria").value = dados.categoria;
}


// ===============================
// 3. EDITAR PRODUTO (PUT)
// ===============================
async function editarProduto() {
    const token = localStorage.getItem("token");
    const id = document.getElementById("produtoId").value;

    const nome = document.getElementById("nome").value;
    const descricao = document.getElementById("descricao").value;
    const preco = document.getElementById("preco").value;
    const estoque = document.getElementById("estoque").value;
    const categoria = document.getElementById("categoria").value;

    const resposta = await fetch(`http://localhost:8000/produtos/${id}/`, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({
            nome: nome,
            descricao: descricao,
            preco: parseFloat(preco),
            estoque: parseInt(estoque),
            categoria: parseInt(categoria)
        })
    });

    const dados = await resposta.json();
    document.getElementById("resultado").textContent = JSON.stringify(dados, null, 2);

    if (resposta.ok) {
        alert("Produto atualizado com sucesso!");
    }
}
</script>

</body>
</html>
