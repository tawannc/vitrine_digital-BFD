<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Detalhes do Produto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Detalhes do Produto</h1>

<div id="produto"></div>

<style>
    .badge-esgotado {
        background: red;
        color: white;
        padding: 4px 8px;
        border-radius: 4px;
        font-weight: bold;
        display: inline-block;
        margin-top: 10px;
    }

    button[disabled] {
        background: #aaa;
        cursor: not-allowed;
    }
</style>

<script>
// ===============================
// PEGAR ID DO PRODUTO PELA URL
// ===============================
function getProdutoId() {
    const params = new URLSearchParams(window.location.search);
    return params.get("id");
}

// ===============================
// CARREGAR DETALHES DO PRODUTO
// ===============================
async function carregarProduto() {
    const id = getProdutoId();
    const resposta = await fetch(`http://localhost:8000/produtos/${id}/`);
    const produto = await resposta.json();

    const container = document.getElementById("produto");

    // imagem principal
    let imagemHTML = "<p>Sem imagem</p>";
    if (produto.imagens && produto.imagens.length > 0) {
        imagemHTML = `<img src="${produto.imagens[0].imagem}" width="250">`;
    }

    // HTML base
    container.innerHTML = `
        ${imagemHTML}
        <h2>${produto.nome}</h2>
        <p><strong>Preço:</strong> R$ ${produto.preco}</p>
        <p><strong>Descrição:</strong> ${produto.descricao}</p>
        <p><strong>Categoria:</strong> ${produto.categoria ?? "Sem categoria"}</p>
    `;

    // ===============================
    // MOSTRAR BADGE "ESGOTADO"
    // ===============================
    if (!produto.disponivel) {
        container.innerHTML += `<span class="badge-esgotado">Esgotado</span>`;
    }

    // ===============================
    // VARIAÇÕES (SE EXISTIREM)
    // ===============================
    if (produto.variacoes && produto.variacoes.length > 0) {
        let selectHTML = `
            <label><strong>Escolha uma variação:</strong></label><br>
            <select id="variacaoSelect">
        `;

        produto.variacoes.forEach(v => {
            let texto = `${v.nome}: ${v.valor} (Estoque: ${v.estoque})`;

            if (v.estoque === 0) {
                selectHTML += `<option value="${v.id}" disabled>${texto} - ESGOTADO</option>`;
            } else {
                selectHTML += `<option value="${v.id}">${texto}</option>`;
            }
        });

        selectHTML += `</select><br><br>`;

        container.innerHTML += selectHTML;
    }

    // ===============================
    // BOTÃO DE COMPRA
    // ===============================
    const botao = document.createElement("button");
    botao.textContent = "Comprar";

    // bloquear compra se produto estiver indisponível
    if (!produto.disponivel) {
        botao.disabled = true;
        botao.textContent = "Indisponível";
    }

    botao.onclick = () => comprar(produto.id);

    container.appendChild(botao);
}

// ===============================
// FUNÇÃO DE COMPRA (DEMO)
// ===============================
function comprar(id) {
    alert("Compra ainda não implementada, mas o botão funciona!");
}

carregarProduto();
</script>

</body>
</html>
